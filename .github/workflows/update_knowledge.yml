name: Update Knowledge Base

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours
  workflow_dispatch:         # Also allows manual trigger from GitHub

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scripts/scrape_knowledge.py

      - name: Commit and push if changed
        run: |
          git config user.name "AFC Bot Scraper"
          git config user.email "bot@africanfreefirecommunity.com"
          git add knowledge_base.txt
          git diff --staged --quiet || git commit -m "Auto-update knowledge base [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
